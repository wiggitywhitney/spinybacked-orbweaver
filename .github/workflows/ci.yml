name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Weaver v0.22.1
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/open-telemetry/weaver/releases/download/v0.22.1/weaver-installer.sh | sh

      - name: Verify Weaver binary attestation
        run: gh attestation verify "$(which weaver)" --repo open-telemetry/weaver
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify Weaver version
        run: weaver --version

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
