groups:
  - id: span.test_app.process_order
    type: span
    stability: development
    brief: Process an incoming order
    span_kind: internal
    attributes:
      - ref: test_app.order.id
        requirement_level: required
      - ref: test_app.order.total
        requirement_level: recommended
  - id: span.test_app.validate_payment
    type: span
    stability: development
    brief: Validate payment for an order
    span_kind: internal
    attributes:
      - ref: test_app.order.id
        requirement_level: required
